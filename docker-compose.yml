version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  seeder:
    build: .
    environment:
      ROLE: seeder
      REDIS_ADDR: redis:6379
      SEED_URLS: https://example.com,https://golang.org
      MAX_DEPTH: "2"
    depends_on:
      - redis

  worker:
    build: .
    environment:
      ROLE: worker
      REDIS_ADDR: redis:6379
      CONCURRENCY: "4"
      MAX_DEPTH: "2"
      RATE_LIMIT_SECONDS: "3"
      STORAGE_DIR: /app/data
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

# Scale workers with:
# docker compose up --build --scale worker=3
